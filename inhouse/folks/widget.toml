id = "folks"
name = "Folks Smart Router"
version = "0.1.0"

# Written by the ASA Stats team; fees are 100% ours -> inhouse.
# (A router widget written by an outside team would be thirdparty with a
# revenue_account and shared fees. Pact/LiquiHog/Hay are inhouse if WE write them.)
origin = "inhouse"
capability = "public"            # no engine needed; public => no engine_endpoints
revenue_account = ""             # empty for inhouse, per the contract

engine_endpoints = []            # required empty for public (validate_manifest enforces)

# Host-injected/consumed context keys (declarative, for audit):
#  - portfolio:bundle / profile:permission: same as historic, drive the page + gate
#  - walletauth:linked_addresses: the subset of the page's addresses linked to the
#    current user (source: walletauth.gating.linked_addresses_for_user). The widget
#    swaps only from whichever linked address is the wallet's active account.
#  - portfolio:asas: per-address ASA holdings injected server-side (the public
#    /api/v2 API is JWT-only, so the browser cannot fetch them with the session).
data = [
    "portfolio:bundle",
    "profile:permission",
    "walletauth:linked_addresses",
    "portfolio:asas",
]

# External hosts the widget's browser code may reach (audit + CSP connect-src).
# VERIFY the real Folks quote/router API host before publication.
hosts = ["https://api.folksrouter.io"]

# NOTE: `category` is NOT yet read by widgethost.manifest.Manifest. To drive the
# settings page by discovery, add `self.category = data.get("category")` to the
# Manifest class (host change). Until then this line is inert; the settings page
# would need a host-side list of swap-widget ids instead.
category = "swap"

# A swap is a single-user action, not address-count-scaled like historic, so a
# bare integer bar fits. 0 = any authenticated profile; ownership is gated
# separately via walletauth:linked_addresses + the live signature.
required_permission = 0
