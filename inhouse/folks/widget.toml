id = "folks"
name = "Folks Smart Router"
version = "0.1.0"

# Written by the ASA Stats team -> inhouse (fees 100% ours, empty revenue_account).
origin = "inhouse"

# CHANGED v1->v2: was "public". The widget now fetches fresh holdings and asset
# metadata via api.client.engine_request, which is only permitted for engine-backed
# widgets (validate_manifest forbids public + engine_endpoints).
capability = "engine-backed"
revenue_account = ""

# Engine scopes this widget calls. MUST be a subset of the deployment token's scopes
# (ASA Stats grants these at the engine; unforkable). The engine implements:
#   account:holdings -> GET /api/v2/internal/accounts/{address}/holdings/  (one Node call)
#   assets:lookup    -> GET /api/v2/internal/assets/{id}/ | ?q=...          (ASA-index lookup)
# Generic, data-named scopes: every router widget declares these identical ones.
engine_endpoints = ["account:holdings", "assets:lookup"]

# Host-injected context (unchanged); portfolio:asas dropped — holdings are now fetched
# fresh via engine_request, not injected.
data = ["portfolio:bundle", "profile:permission", "walletauth:linked_addresses"]

# Browser still calls Folks directly for quote + prepare (the JS SDK).
hosts = ["https://api.folksrouter.io"]

category = "swap"

# A swap is a single-user action, not address-count-scaled; ownership is gated by
# walletauth:linked_addresses + the live signature. 0 = any authenticated profile.
required_permission = 0
