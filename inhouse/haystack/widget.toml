id = "haystack"
name = "Haystack Order Router"
version = "0.1.0"

# Written by the ASA Stats team -> inhouse (fees 100% ours, empty revenue_account).
origin = "inhouse"

# Engine-backed: fetches fresh holdings + asset metadata via api.client.engine_request.
capability = "engine-backed"
revenue_account = ""

# Identical generic, data-named scopes as every router widget.
engine_endpoints = ["account:holdings", "assets:lookup"]

data = ["portfolio:bundle", "profile:permission", "walletauth:linked_addresses"]

# Browser calls the Haystack Router API directly (quote + prepare via the JS SDK),
# and the SDK's composer SUBMITS through an Algod node -> both must be allowed.
hosts = [
    "https://hayrouter.txnlab.dev",
    "https://mainnet-api.4160.nodely.dev",
]

category = "swap"

# A swap is a single-user action; ownership is gated by walletauth + live signature.
required_permission = 0
