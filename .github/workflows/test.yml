name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  testing:
    # Runs JavaScript tests only.
    # Python tests for the widgets module are handled by the
    # parent "frontend" repo's CI/CD via submodule integration.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "inhouse/historic/package-lock.json"

      - name: Install dependencies (historic)
        run: |
          cd inhouse/historic
          npm install

      - name: Run historic Javascript tests with coverage
        run: |
          cd inhouse/historic
          npm run test # Ensure this npm script generates coverage!

      - name: Upload historic coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: inhouse/historic/tests/javascript/coverage
          flags: historic-javascript
          name: historic-coverage

      - name: Install dependencies (swapcore)
        run: |
          cd inhouse/swapcore
          npm install

      - name: Run swapcore Javascript tests with coverage
        run: |
          cd inhouse/swapcore
          npm run test

      - name: Upload swapcore coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: inhouse/swapcore/tests/javascript/coverage
          flags: swapcore-javascript
          name: swapcore-coverage