name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  testing:
    # Runs JavaScript tests only.
    # Python tests for the widgets module are handled by the
    # parent "frontend" repo's CI/CD via submodule integration.

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "inhouse/folks/package-lock.json"

      - name: Install dependencies (historic)
        run: |
          cd inhouse/historic
          npm install

      - name: Run historic Javascript tests
        run: |
          cd inhouse/historic
          npm run test

      - name: Install dependencies (swapcore)
        run: |
          cd inhouse/swapcore
          npm install

      - name: Run swapcore Javascript tests
        run: |
          cd inhouse/swapcore
          npm run test
